name: Windows Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: Windows x64 installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Select stable Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
          rustc --version
          cargo --version

      - name: Install frontend dependencies
        run: npm --prefix apps/desktop ci

      - name: Validate bundled offline content
        run: npm run verify:content

      - name: Type-check frontend
        run: npm --prefix apps/desktop run typecheck

      - name: Run frontend tests
        run: npm --prefix apps/desktop test

      - name: Run Rust workspace tests
        run: cargo test --workspace --release --locked

      - name: Build NSIS installer
        run: npm --prefix apps/desktop run tauri build -- --bundles nsis

      - name: Build MSI installer
        run: npm --prefix apps/desktop run tauri build -- --bundles msi

      - name: Verify packaged frontend stays offline
        run: npm run verify:offline

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: hero-lineup-windows-x64-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/msi/*.msi
